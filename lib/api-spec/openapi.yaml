openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Personal Finance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: accounts
    description: Account operations
  - name: categories
    description: Category operations
  - name: subcategories
    description: Subcategory operations
  - name: transactions
    description: Transaction operations
  - name: budgets
    description: Budget operations
  - name: dashboard
    description: Dashboard operations
  - name: auth
    description: Authentication operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Validation error or email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounts:
    get:
      operationId: getAccounts
      tags: [accounts]
      summary: List all accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /subcategories:
    get:
      operationId: getSubcategories
      tags: [subcategories]
      summary: List all subcategories
      parameters:
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of subcategories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subcategory"
    post:
      operationId: createSubcategory
      tags: [subcategories]
      summary: Create a subcategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubcategoryRequest"
      responses:
        "201":
          description: Subcategory created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcategory"

  /subcategories/{id}:
    put:
      operationId: updateSubcategory
      tags: [subcategories]
      summary: Update a subcategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubcategoryRequest"
      responses:
        "200":
          description: Subcategory updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcategory"
    delete:
      operationId: deleteSubcategory
      tags: [subcategories]
      summary: Delete a subcategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: List transactions with optional filters
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            description: "Filter by month YYYY-MM"
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
        - name: account_id
          in: query
          required: false
          schema:
            type: integer
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [income, expense, transfer]
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/people:
    get:
      operationId: getTransactionPeople
      tags: [transactions]
      summary: Get distinct person names from transactions
      responses:
        "200":
          description: List of distinct person names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /transactions/import:
    post:
      operationId: importTransactions
      tags: [transactions]
      summary: Import transactions from CSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportTransactionsRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "200":
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /budgets:
    get:
      operationId: getBudgets
      tags: [budgets]
      summary: List budgets
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            description: "Filter by month YYYY-MM"
      responses:
        "200":
          description: List of budgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Budget"
    post:
      operationId: createBudget
      tags: [budgets]
      summary: Create or update a budget entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetRequest"
      responses:
        "201":
          description: Budget created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /budgets/{id}:
    put:
      operationId: updateBudget
      tags: [budgets]
      summary: Update a budget entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetRequest"
      responses:
        "200":
          description: Budget updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
    delete:
      operationId: deleteBudget
      tags: [budgets]
      summary: Delete a budget entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for current month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            description: "Month YYYY-MM, defaults to current month"
        - name: person
          in: query
          required: false
          schema:
            type: string
            description: "Filter by person name. Omit for all."
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/monthly-chart:
    get:
      operationId: getMonthlyChart
      tags: [dashboard]
      summary: Get monthly income vs expenses for the past 12 months
      parameters:
        - name: person
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Monthly chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyChartPoint"

  /dashboard/category-chart:
    get:
      operationId: getCategoryChart
      tags: [dashboard]
      summary: Get spending by category for the current month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
        - name: person
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Category chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryChartPoint"

  /dashboard/subcategory-chart:
    get:
      operationId: getSubcategoryChart
      tags: [dashboard]
      summary: Get spending by subcategory for a given month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
        - name: person
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Subcategory chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubcategoryChartPoint"

  /dashboard/budget-vs-actual:
    get:
      operationId: getBudgetVsActual
      tags: [dashboard]
      summary: Get budget vs actual spending by category for a given month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
        - name: person
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Budget vs actual data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetVsActualPoint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - fullName
        - email
        - password

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        username:
          type: string
      required:
        - success
        - username

    User:
      type: object
      properties:
        username:
          type: string
        authenticated:
          type: boolean
      required:
        - username
        - authenticated

    Account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [bank, credit_card]
        person:
          type: string
        starting_balance:
          type: number
          description: User-provided opening balance
        balance:
          type: number
          description: Calculated from transactions plus starting balance
      required:
        - id
        - name
        - type
        - person

    CreateAccountRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [bank, credit_card]
        person:
          type: string
        starting_balance:
          type: number
          description: Opening balance for this account (optional, defaults to 0)
      required:
        - name
        - type
        - person

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [income, expense]
      required:
        - id
        - name
        - type

    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [income, expense]
      required:
        - name
        - type

    Subcategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category_id:
          type: integer
        type:
          type: string
          enum: [income, expense]
      required:
        - id
        - name
        - category_id
        - type

    CreateSubcategoryRequest:
      type: object
      properties:
        name:
          type: string
        category_id:
          type: integer
        type:
          type: string
          enum: [income, expense]
      required:
        - name
        - category_id
        - type

    Transaction:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        description:
          type: string
        account_id:
          type: integer
        category_id:
          type: integer
          nullable: true
        subcategory_id:
          type: integer
          nullable: true
        amount:
          type: number
          description: Negative = expense, positive = income
        person:
          type: string
        type:
          type: string
          enum: [income, expense, transfer]
        account_name:
          type: string
          nullable: true
        category_name:
          type: string
          nullable: true
        subcategory_name:
          type: string
          nullable: true
      required:
        - id
        - date
        - description
        - account_id
        - amount
        - person
        - type

    CreateTransactionRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        description:
          type: string
        account_id:
          type: integer
        category_id:
          type: integer
          nullable: true
        subcategory_id:
          type: integer
          nullable: true
        amount:
          type: number
        person:
          type: string
        type:
          type: string
          enum: [income, expense, transfer]
      required:
        - date
        - description
        - account_id
        - amount
        - person
        - type

    ImportTransactionsRequest:
      type: object
      properties:
        csv_data:
          type: string
          description: Raw CSV string
      required:
        - csv_data

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - imported
        - errors

    Budget:
      type: object
      properties:
        id:
          type: integer
        category_id:
          type: integer
        subcategory_id:
          type: integer
          nullable: true
        month:
          type: string
        budget_amount:
          type: number
        is_recurring:
          type: boolean
        category_name:
          type: string
          nullable: true
        subcategory_name:
          type: string
          nullable: true
      required:
        - id
        - category_id
        - month
        - budget_amount

    CreateBudgetRequest:
      type: object
      properties:
        category_id:
          type: integer
        subcategory_id:
          type: integer
          nullable: true
        month:
          type: string
        budget_amount:
          type: number
        is_recurring:
          type: boolean
      required:
        - category_id
        - month
        - budget_amount

    DashboardSummary:
      type: object
      properties:
        total_income:
          type: number
        total_expenses:
          type: number
        net_cash_flow:
          type: number
        month:
          type: string
      required:
        - total_income
        - total_expenses
        - net_cash_flow
        - month

    MonthlyChartPoint:
      type: object
      properties:
        month:
          type: string
        income:
          type: number
        expenses:
          type: number
      required:
        - month
        - income
        - expenses

    CategoryChartPoint:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        color:
          type: string
      required:
        - category
        - amount

    SubcategoryChartPoint:
      type: object
      properties:
        subcategory:
          type: string
        category:
          type: string
        amount:
          type: number
        color:
          type: string
      required:
        - subcategory
        - category
        - amount

    BudgetVsActualPoint:
      type: object
      properties:
        category:
          type: string
        budget:
          type: number
        actual:
          type: number
        variance:
          type: number
      required:
        - category
        - budget
        - actual
        - variance
